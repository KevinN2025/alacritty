[colors.primary]
background = "#0f0f10"   # deep ash black
foreground = "#c6c6c6"   # soft gray text

[colors.cursor]
text = "#0f0f10"
cursor = "#c6c6c6"

[colors.selection]
text = "#0f0f10"
background = "#5a5a5a"

# Normal colors (low saturation, cold ash tones)
[colors.normal]
black   = "#0f0f10"
red     = "#7a5c5c"   # muted ember red
green   = "#6e7f6a"   # dusty green
yellow  = "#8a7a5c"   # burnt sand
blue    = "#5c6a7a"   # steel blue
magenta = "#7a6a7a"   # faded purple
cyan    = "#6a7a7a"   # cold cyan
white   = "#c6c6c6"

# Bright colors (slightly lifted, still restrained)
[colors.bright]
black   = "#3a3a3c"
red     = "#a06a6a"
green   = "#8fa889"
yellow  = "#b5a27a"
blue    = "#7a8fa6"
magenta = "#9a859a"
cyan    = "#8fa6a6"
white   = "#e5e5e5"

# Optional dim colors (for depth)
[colors.dim]
black   = "#0a0a0b"
red     = "#5a4444"
green   = "#4f5a4b"
yellow  = "#665a44"
blue    = "#44505a"
magenta = "#5a4f5a"
cyan    = "#4f5a5a"
white   = "#8a8a8a"
